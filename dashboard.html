<!DOCTYPE html>
<html lang="en" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%); background-color: #0f0f23; color: #fff; min-height: 100vh;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>EventFlow Dashboard</title>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#faf5ff',
                            100: '#f3e8ff',
                            200: '#e9d5ff',
                            300: '#d8b4fe',
                            400: '#c084fc',
                            500: '#a855f7',
                            600: '#9333ea',
                            700: '#7c3aed',
                            800: '#6b21a8',
                            900: '#581c87',
                        },
                        accent: {
                            400: '#f472b6',
                            500: '#ec4899',
                            600: '#db2777',
                        }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'slide-up': 'slideUp 0.5s ease-out',
                        'fade-in': 'fadeIn 0.6s ease-out',
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            color-scheme: dark;
            background-color: #0f0f23;
        }
        html, body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%) !important;
            background-color: #0f0f23 !important;
            background-repeat: no-repeat !important;
            background-attachment: fixed !important;
            color: #fff !important;
        }
        body {
            overflow-x: hidden;
            min-height: 100vh;
        }
        main {
            background: transparent !important;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05) !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
        }
        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%) !important;
            color: #fff !important;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="gradient-bg text-white font-sans overflow-x-hidden" style="min-height:100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%); background-color: #0f0f23; color: #fff;">
    <!-- Animated Background Blobs (match main site) -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="blob w-96 h-96 bg-primary-600 top-20 -left-48" style="animation-delay: 0s;"></div>
        <div class="blob w-80 h-80 bg-accent-500 top-1/2 -right-40" style="animation-delay: 2s;"></div>
        <div class="blob w-72 h-72 bg-primary-500 bottom-20 left-1/3" style="animation-delay: 4s;"></div>
    </div>
    <nav class="bg-gray-800 p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-pink-500 flex items-center justify-center">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div>
                    <div class="font-bold">EventFlow</div>
                    <div class="text-sm text-gray-300">Dashboard</div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="planLabel" class="text-sm text-gray-300"></div>
                <button id="signOutBtn" class="px-3 py-2 bg-white/5 rounded">Sign Out</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <section class="lg:col-span-2 glass-card p-6 rounded-2xl">
            <h2 class="text-2xl font-bold mb-4">Welcome to your dashboard</h2>
            <p class="text-gray-300 mb-6">Manage events, view analytics, and access features included in your plan.</p>

            <div id="planNotice" class="mb-6 rounded-2xl border border-yellow-400/20 bg-yellow-500/10 p-4 text-yellow-100 hidden"></div>
            <div id="featuresList" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6"></div>
                <div class="mb-6 col-span-1 md:col-span-2">
                    <h3 class="font-semibold mb-2">Analytics</h3>
                    <div class="glass-card p-4 rounded">
                        <canvas id="analyticsChart" height="120"></canvas>
                    </div>
                </div>

            <div class="mb-6">
                <h3 class="font-semibold mb-2">Create Event</h3>
                <form id="dashboardCreateEvent" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input id="dashEventTitle" placeholder="Title" class="p-2 rounded bg-white/5" required>
                    <input id="dashEventDate" type="date" class="p-2 rounded bg-white/5">
                    <input id="dashEventTime" type="time" class="p-2 rounded bg-white/5">
                    <input id="dashEventLocation" placeholder="Location" class="p-2 rounded bg-white/5">
                    <textarea id="dashEventDescription" placeholder="Description" class="p-2 rounded bg-white/5 md:col-span-2"></textarea>
                    <input id="dashTicketPrice" type="number" placeholder="Ticket price" class="p-2 rounded bg-white/5">
                    <div id="eventLimitInfo" class="text-sm text-gray-300 md:col-span-2"></div>
                    <button id="dashCreateBtn" class="md:col-span-2 btn-primary py-2 rounded">Create Event</button>
                </form>
            </div>

            <div>
                <h3 class="font-semibold mb-2">Events</h3>
                <div id="dashboardEvents" class="space-y-3"></div>
            </div>
        </section>

        <aside class="glass-card p-6 rounded-2xl">
            <h3 class="font-semibold mb-4">Account</h3>
            <div id="accountInfo" class="text-sm text-gray-300 mb-6"></div>

            <h3 class="font-semibold mb-2">Plan Status</h3>
            <div id="planStatusNotice" class="mb-4 rounded-2xl border p-4 text-sm hidden"></div>
            <h3 class="font-semibold mb-2">Plan Features</h3>
            <ul id="planFeatures" class="text-sm text-gray-300 space-y-2 mb-6"></ul>
            <div id="planFeatureCards" class="grid grid-cols-1 gap-3 mb-6"></div>
            <div class="glass-card p-4 rounded mb-6">
                <h3 class="font-semibold mb-2">Plan Summary</h3>
                <div id="planSummary" class="text-sm text-gray-300 space-y-1"></div>
            </div>

            <h3 class="font-semibold mb-2">Quick Actions</h3>
            <div class="flex flex-col gap-2">
                <button id="openAnalytics" class="px-3 py-2 bg-white/5 rounded">View Analytics</button>
                <button id="openIntegrations" class="px-3 py-2 bg-white/5 rounded">Manage Integrations</button>
                <button id="brandingBtn" class="px-3 py-2 bg-white/5 rounded">Upload Branding</button>
                <button id="upgradePlanBtn" class="px-3 py-2 bg-primary-500 text-white rounded">Upgrade Plan</button>
                <input id="brandingUpload" type="file" accept="image/*" class="hidden">
                <img id="brandingPreview" src="" alt="Branding Preview" class="mt-3 rounded hidden w-full" />
            </div>
        </aside>
    </main>

    <div id="toast" class="fixed right-6 bottom-6 hidden">
        <div id="toastInner" class="bg-gray-800 border border-white/10 p-4 rounded shadow">
            <div id="toastMessage">Saved</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
