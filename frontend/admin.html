<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventFlow Admin Dashboard</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e'
                        },
                        accent: {
                            400: '#f59e0b',
                            500: '#f97316',
                            600: '#ea580c'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="gradient-bg text-white font-sans min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-6 mb-10">
            <div>
                <p class="text-sm uppercase tracking-[0.3em] text-primary-300 mb-3">Database View</p>
                <h1 class="text-4xl md:text-5xl font-bold">EventFlow Admin Dashboard</h1>
                <p class="text-gray-300 mt-3 max-w-2xl">This page shows the data saved by the website in SQLite. Use it to check users, events, messages, bookings, favorites, and login sessions.</p>
            </div>
            <div class="flex gap-3">
                <button id="refreshBtn" class="btn-primary px-5 py-3 rounded-xl font-semibold">
                    <i class="fas fa-rotate mr-2"></i>Refresh
                </button>
                <a href="index.html" class="px-5 py-3 rounded-xl border border-white/20 hover:bg-white/10 transition-colors font-semibold">
                    Back to Site
                </a>
            </div>
        </div>

        <div id="statsGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-10"></div>

        <div class="grid gap-8">
            <section class="glass-card rounded-3xl p-6">
                <div class="flex items-center justify-between gap-4 mb-5">
                    <div>
                        <h2 class="text-2xl font-bold">Table Records</h2>
                        <p class="text-gray-400 text-sm">Choose a table to view its rows.</p>
                    </div>
                    <select id="tableSelect" class="px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:outline-none focus:border-primary-500">
                        <option value="users">Users</option>
                        <option value="events">Events</option>
                        <option value="contacts">Contacts</option>
                        <option value="bookings">Bookings</option>
                        <option value="favorites">Favorites</option>
                        <option value="sessions">Sessions</option>
                    </select>
                </div>

                <div id="tableMeta" class="text-sm text-gray-400 mb-4"></div>
                <div class="overflow-x-auto rounded-2xl border border-white/10">
                    <table class="min-w-full text-sm">
                        <thead id="tableHead" class="bg-white/5"></thead>
                        <tbody id="tableBody" class="divide-y divide-white/10 bg-black/20"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/70" data-close-edit-modal></div>
        <div class="relative min-h-screen flex items-center justify-center p-4">
            <div class="glass-card rounded-3xl p-8 w-full max-w-2xl">
                <div class="flex items-start justify-between gap-4 mb-6">
                    <div>
                        <p class="text-sm uppercase tracking-[0.2em] text-primary-300 mb-2">Edit Record</p>
                        <h2 id="editModalTitle" class="text-2xl font-bold">Update data</h2>
                    </div>
                    <button type="button" class="w-10 h-10 rounded-full hover:bg-white/10 flex items-center justify-center transition-colors" data-close-edit-modal>
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <form id="editForm" class="space-y-5">
                    <div id="editFields" class="grid md:grid-cols-2 gap-4"></div>
                    <div class="flex flex-col sm:flex-row gap-3 sm:justify-end">
                        <button type="button" class="px-5 py-3 rounded-xl border border-white/20 hover:bg-white/10 transition-colors font-semibold" data-close-edit-modal>
                            Cancel
                        </button>
                        <button type="submit" class="btn-primary px-5 py-3 rounded-xl font-semibold">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="authGuard.js"></script>
    <script src="logoutButtonSetup.js"></script>
    <script src="admin.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        await window.authGuard?.protectPage?.({ redirectTo: '/login.html' });
      });
    </script>
</body>
</html>
