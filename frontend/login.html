<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - EventFlow</title>
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#faf5ff',
              100: '#f3e8ff',
              200: '#e9d5ff',
              300: '#d8b4fe',
              400: '#c084fc',
              500: '#a855f7',
              600: '#9333ea',
              700: '#7c3aed',
              800: '#6b21a8',
              900: '#581c87',
            },
            accent: {
              400: '#f472b6',
              500: '#ec4899',
              600: '#db2777',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
            'slide-up': 'slideUp 0.5s ease-out',
            'fade-in': 'fadeIn 0.6s ease-out',
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    :root { color-scheme: dark; background-color: #0f0f23; }
    html, body { min-height: 100vh; margin: 0; padding: 0; }
    body {
      overflow-x: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%) !important;
      background-color: #0f0f23 !important;
      background-repeat: no-repeat !important;
      background-attachment: fixed !important;
      color: #fff !important;
    }
    .glass-card { background: rgba(255, 255, 255, 0.05) !important; border-color: rgba(255, 255, 255, 0.1) !important; }
    .btn-primary { background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%) !important; color: #fff !important; }
    .input-glow:focus { box-shadow: 0 0 0 4px rgba(168,85,247,0.25), 0 0 0 1px rgba(236,72,153,0.25) !important; }
  </style>
</head>
<body class="gradient-bg text-white font-sans overflow-x-hidden">

  <!-- Animated Background Blobs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="blob w-96 h-96 bg-primary-600 top-20 -left-48" style="animation-delay: 0s;"></div>
    <div class="blob w-80 h-80 bg-accent-500 top-1/2 -right-40" style="animation-delay: 2s;"></div>
    <div class="blob w-72 h-72 bg-primary-500 bottom-20 left-1/3" style="animation-delay: 4s;"></div>
  </div>

  <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
    <div class="glass-card rounded-3xl p-8 max-w-md w-full animate-slide-up">
      <div class="flex items-center justify-center mb-6">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary-500 to-accent-500 flex items-center justify-center">
          <i class="fas fa-calendar-check"></i>
        </div>
      </div>

      <h1 class="text-3xl font-extrabold text-center mb-2">Welcome back</h1>
      <p class="text-gray-400 text-center mb-6">Login to manage your events and bookings.</p>

      <div id="loginError" class="hidden mb-4 rounded-2xl border border-red-400/20 bg-red-500/10 px-4 py-3 text-red-100 text-sm"></div>

      <form id="loginForm" class="space-y-4" autocomplete="current-password">
        <div>
          <label class="block text-sm font-medium mb-2">Email or Username</label>
          <input id="loginIdentifier" name="identifier" type="text" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:border-primary-500 focus:outline-none input-glow transition-all" placeholder="you@example.com or your username" required>
          <p class="mt-1 text-xs text-gray-400">We use your account email for sign-in.</p>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Password</label>
          <input id="loginPassword" name="password" type="password" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:border-primary-500 focus:outline-none input-glow transition-all" placeholder="Enter your password" required>
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 text-sm text-gray-300">
            <input id="rememberMe" type="checkbox" class="rounded" checked>
            Remember Me
          </label>

          <button type="button" id="forgotPasswordLink" class="text-sm text-primary-400 hover:underline">
            Forgot Password?
          </button>
        </div>

        <button type="submit" class="w-full btn-primary py-3 rounded-xl font-semibold text-lg">
          Login
        </button>
      </form>

      <div class="mt-6 text-center">
        <span class="text-gray-400 text-sm">No account yet?</span>
        <a href="/index.html" class="text-primary-400 hover:underline ml-1 text-sm font-semibold">Create one</a>
      </div>
    </div>
  </div>

  <!-- Reuse existing reset modal page UI by linking out -->
  <script src="auth.js"></script>
  <script>
    // Open reset modal by navigating directly to the provided reset modal page.
    document.getElementById('forgotPasswordLink').addEventListener('click', () => {
      window.location.href = '/resetPasswordModal.html';
    });
  </script>
  <script src="routeGuard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // If already authenticated, skip login.
      const me = await window.authApi?.getMe?.();
      if (me?.ok && me.user) {
        window.location.href = '/index.html';
      }


      const form = document.getElementById('loginForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const identifier = document.getElementById('loginIdentifier').value.trim();
        const password = document.getElementById('loginPassword').value;
        const remember = document.getElementById('rememberMe').checked;

        const errEl = document.getElementById('loginError');
        errEl.classList.add('hidden');
        errEl.textContent = '';

        if (!identifier || !password) {
          errEl.textContent = 'Please enter your email/username and password.';
          errEl.classList.remove('hidden');
          return;
        }
        if (password.length < 1) {
          errEl.textContent = 'Password cannot be empty.';
          errEl.classList.remove('hidden');
          return;
        }

        try {
          // Backend expects email; if user types username, we still try as email.
          // If you want true username support, backend needs to query by username.
          const { ok, error, token, user } = await window.authApi.login({
            email: identifier,
            password,
            rememberMe: remember
          });

          if (!ok) {
            errEl.textContent = error || 'Login failed. Please try again.';
            errEl.classList.remove('hidden');
            return;
          }

          window.location.href = '/index.html';
        } catch (ex) {
          errEl.textContent = (ex && ex.message) ? ex.message : 'Login failed. Please try again.';
          errEl.classList.remove('hidden');
        }
      });
    });
  </script>
</body>
</html>
