<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="glass-card rounded-3xl p-8 max-w-md w-full">
        <h1 class="text-3xl font-bold mb-4 text-center">Reset Your Password</h1>
        <p id="resetTokenNotice" class="text-sm text-gray-400 mb-6">Enter a new password to complete the reset flow.</p>
        <form id="resetTokenForm" class="space-y-4">
            <input id="resetToken" name="token" type="hidden">
            <div>
                <label class="block text-sm font-medium mb-2">New Password</label>
                <input id="resetTokenNewPassword" name="newPassword" type="password" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 focus:border-primary-500 focus:outline-none input-glow transition-all" placeholder="Enter your new password" required>
            </div>
            <button type="submit" class="w-full btn-primary py-3 rounded-xl font-semibold">Update Password</button>
        </form>
        <div class="mt-4 text-center">
            <a href="index.html" class="text-primary-400 hover:underline">Back to Sign In</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
